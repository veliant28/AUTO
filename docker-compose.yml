services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: autoparts
      TZ: Europe/Kyiv
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    ports:
      - "6382:6379"
    environment:
      TZ: Europe/Kyiv
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8080:8000"
    environment:
      AUTO_PARTS_POSTGRES_USER: ${AUTO_PARTS_POSTGRES_USER:-postgres}
      AUTO_PARTS_POSTGRES_PASSWORD: ${AUTO_PARTS_POSTGRES_PASSWORD}
      AUTO_PARTS_POSTGRES_SERVER: postgres
      AUTO_PARTS_POSTGRES_PORT: 5432
      AUTO_PARTS_POSTGRES_DB: ${AUTO_PARTS_POSTGRES_DB:-autoparts}
      AUTO_PARTS_REDIS_HOST: redis
      AUTO_PARTS_REDIS_PORT: 6379
      AUTO_PARTS_TECDOC_API_KEY: ${AUTO_PARTS_TECDOC_API_KEY}
      AUTO_PARTS_TECDOC_API_SECRET: ${AUTO_PARTS_TECDOC_API_SECRET}
      AUTO_PARTS_TELEGRAM_BOT_TOKEN: ${AUTO_PARTS_TELEGRAM_BOT_TOKEN}
      AUTO_PARTS_SECRET_KEY: ${AUTO_PARTS_SECRET_KEY}
      PYTHONUNBUFFERED: 1
      TZ: Europe/Kyiv
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - ./Backup:/Backup
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      - postgres
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build: ./backend
    container_name: celery_worker
    command: celery -A app.workers worker --loglevel=info
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - ./Backup:/Backup
    environment:
      AUTO_PARTS_POSTGRES_USER: ${AUTO_PARTS_POSTGRES_USER:-postgres}
      AUTO_PARTS_POSTGRES_PASSWORD: ${AUTO_PARTS_POSTGRES_PASSWORD}
      AUTO_PARTS_POSTGRES_SERVER: postgres
      AUTO_PARTS_POSTGRES_PORT: 5432
      AUTO_PARTS_POSTGRES_DB: ${AUTO_PARTS_POSTGRES_DB:-autoparts}
      AUTO_PARTS_REDIS_HOST: redis
      AUTO_PARTS_REDIS_PORT: 6379
      AUTO_PARTS_TECDOC_API_KEY: ${AUTO_PARTS_TECDOC_API_KEY}
      AUTO_PARTS_TECDOC_API_SECRET: ${AUTO_PARTS_TECDOC_API_SECRET}
      AUTO_PARTS_TELEGRAM_BOT_TOKEN: ${AUTO_PARTS_TELEGRAM_BOT_TOKEN}
      AUTO_PARTS_SECRET_KEY: ${AUTO_PARTS_SECRET_KEY}
      PYTHONUNBUFFERED: 1
      TZ: Europe/Kyiv
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  celery_beat:
    build: ./backend
    command: sh -c "while true; do sleep 300; rm -f /app/celerybeat-schedule-wal /app/celerybeat-schedule-shm 2>/dev/null; done & celery -A app.workers beat --loglevel=info"
    volumes:
      - ./backend:/app
    environment:
      AUTO_PARTS_POSTGRES_USER: ${AUTO_PARTS_POSTGRES_USER:-postgres}
      AUTO_PARTS_POSTGRES_PASSWORD: ${AUTO_PARTS_POSTGRES_PASSWORD}
      AUTO_PARTS_POSTGRES_SERVER: postgres
      AUTO_PARTS_POSTGRES_PORT: 5432
      AUTO_PARTS_POSTGRES_DB: ${AUTO_PARTS_POSTGRES_DB:-autoparts}
      AUTO_PARTS_REDIS_HOST: redis
      AUTO_PARTS_REDIS_PORT: 6379
      AUTO_PARTS_TECDOC_API_KEY: ${AUTO_PARTS_TECDOC_API_KEY}
      AUTO_PARTS_TECDOC_API_SECRET: ${AUTO_PARTS_TECDOC_API_SECRET}
      AUTO_PARTS_TELEGRAM_BOT_TOKEN: ${AUTO_PARTS_TELEGRAM_BOT_TOKEN}
      AUTO_PARTS_SECRET_KEY: ${AUTO_PARTS_SECRET_KEY}
      PYTHONUNBUFFERED: 1
      TZ: Europe/Kyiv
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3080:3000"
    depends_on:
      - backend
    environment:
      - INTERNAL_API_URL=http://backend:8000/api/v1
      - TZ=Europe/Kyiv
      - WATCHPACK_POLLING=true
      - NODE_ENV=development
      - CI=true
    command: pnpm dev
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
  redis_data:
