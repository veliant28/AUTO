name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: autoparts
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        env:
          AUTO_PARTS_POSTGRES_USER: postgres
          AUTO_PARTS_POSTGRES_PASSWORD: postgres
          AUTO_PARTS_POSTGRES_SERVER: localhost
          AUTO_PARTS_POSTGRES_PORT: 5432
          AUTO_PARTS_POSTGRES_DB: autoparts
          AUTO_PARTS_SECRET_KEY: test-secret-key-min-16-chars
          AUTO_PARTS_TECDOC_API_KEY: test
          AUTO_PARTS_TECDOC_API_SECRET: test
        run: |
          cd backend
          pytest tests/ -v --cov=app --cov-report=xml --tb=short

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'frontend/pnpm-lock.yaml'

      - name: Install dependencies
        run: |
          cd frontend
          pnpm install --no-frozen-lockfile

      - name: Run tests
        run: |
          cd frontend
          pnpm test -- --coverage

  docker-build:
    needs: [backend-tests, frontend-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          docker compose build

      - name: Run Docker Compose
        run: |
          docker compose up -d
